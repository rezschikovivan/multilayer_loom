name: Lint Check
on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  lint-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (for Tkinter/GUI tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-dev libxcb1 libxkbcommon0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff

      - name: Run linter with auto-fix
        run: ruff check

      - name: Run tests with virtual display
        run: xvfb-run -a python -m unittest discover -v
